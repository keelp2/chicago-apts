<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chicago Apt Search</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
  --text: #f0ede8; --text2: #a09a92; --text3: #5a5550;
  --accent: #c4a96b; --green: #7ec8a0; --red: #e87c6c; --blue: #7ab8d4; --yellow: #f0d070;
  --header-h: 52px; --tab-h: 48px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

#header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 0 12px; }
#header-logo { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; color: var(--accent); white-space: nowrap; }
#filter-scroll { display: flex; align-items: center; gap: 6px; overflow-x: auto; flex: 1; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
#filter-scroll::-webkit-scrollbar { display: none; }
.chip { display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 10px; font-size: 12px; color: var(--text2); white-space: nowrap; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.chip select { background: transparent; border: none; color: var(--text2); font-size: 12px; outline: none; cursor: pointer; -webkit-appearance: none; padding-right: 2px; }
.chip select option { background: #1a1a1a; }
.chip.toggle { user-select: none; transition: all 0.15s; }
.chip.toggle.on { background: rgba(196,169,107,0.15); border-color: var(--accent); color: var(--accent); }

#tabs { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; height: var(--tab-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; }
.tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 10px; color: var(--text3); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: color 0.15s; }
.tab.active { color: var(--accent); }
.tab-icon { font-size: 18px; line-height: 1; }

#map-panel, #list-panel { position: fixed; top: var(--header-h); left: 0; right: 0; bottom: var(--tab-h); transition: transform 0.25s ease; }
#map-panel { z-index: 1; }
#list-panel { z-index: 2; background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch; transform: translateX(100%); }
#map-panel.active { transform: translateX(0); }
#list-panel.active { transform: translateX(0); }
#map { width: 100%; height: 100%; }
.leaflet-container { background: #1a1a1a !important; }

#bottom-sheet { position: fixed; left: 0; right: 0; bottom: var(--tab-h); z-index: 500; background: var(--surface); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; transform: translateY(100%); transition: transform 0.3s ease; max-height: 60vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#bottom-sheet.open { transform: translateY(0); }
#sheet-handle { display: flex; justify-content: center; padding: 10px 0 4px; cursor: pointer; }
#sheet-handle-bar { width: 36px; height: 4px; background: var(--border); border-radius: 2px; }
#sheet-content { padding: 0 16px 24px; }

#list-header { padding: 12px 14px 8px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 1; border-bottom: 1px solid var(--border); }
#apt-list { padding: 8px; display: flex; flex-direction: column; gap: 6px; }

.apt-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: border-color 0.15s; }
.apt-card:active { background: var(--surface2); }
.apt-card.selected { border-color: var(--accent); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 3px; }
.card-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
.card-price { font-size: 14px; font-weight: 700; color: var(--accent); white-space: nowrap; flex-shrink: 0; }
.card-address { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
.card-footer { font-size: 11px; color: var(--text3); display: flex; gap: 10px; flex-wrap: wrap; }
.tour-date { color: var(--yellow); }

.tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.tag.green   { background: rgba(126,200,160,0.12); color: var(--green); border-color: rgba(126,200,160,0.25); }
.tag.gold    { background: rgba(196,169,107,0.12); color: var(--accent);border-color: rgba(196,169,107,0.25); }
.tag.avail   { background: rgba(126,200,160,0.18); color: var(--green); border-color: rgba(126,200,160,0.3); font-weight: 600; }
.tag.unavail { background: rgba(232,124,108,0.12); color: var(--red);   border-color: rgba(232,124,108,0.25); font-weight: 600; }

.detail-name { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
.detail-address { font-size: 12px; color: var(--text3); margin-bottom: 10px; }
.detail-price { font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
.detail-price span { font-size: 13px; font-weight: 400; color: var(--text3); }
.avail-pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 14px; }
.avail-pill.yes { background: rgba(126,200,160,0.15); color: var(--green); }
.avail-pill.no  { background: rgba(232,124,108,0.1);  color: var(--red); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 14px; }
.detail-grid.two { grid-template-columns: 1fr 1fr; }
.dg-item { background: var(--surface2); border-radius: 8px; padding: 8px 10px; }
.dg-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); margin-bottom: 3px; }
.dg-val { font-size: 13px; font-weight: 600; color: var(--text); word-break: break-word; }
.dg-val.green { color: var(--green); } .dg-val.red { color: var(--red); } .dg-val.gold { color: var(--accent); }
.section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; margin-top: 14px; }
.notes-box { background: var(--surface2); border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--text2); line-height: 1.6; font-style: italic; margin-bottom: 12px; }
.action-btn { display: block; width: 100%; text-align: center; padding: 11px; border-radius: 8px; border: 1px solid var(--accent); color: var(--accent); background: transparent; font-size: 13px; font-weight: 600; text-decoration: none; cursor: pointer; margin-bottom: 8px; -webkit-tap-highlight-color: transparent; }
.action-btn:active { background: rgba(196,169,107,0.1); }

.map-pin { background: var(--accent); border: 2px solid #0f0f0f; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.6); cursor: pointer; }
.map-pin.sel { background: #fff; border-color: #fff; }
.map-pin.unavail { background: #7a3a35; }
.pin-label { transform: rotate(45deg); font-size: 9px; font-weight: 700; color: #0f0f0f; line-height: 1; }

/* transit stop dots */
.stop-dot { border-radius: 50%; border: 2px solid #111; box-shadow: 0 1px 4px rgba(0,0,0,0.5); }
.bus-stop-icon { background: #fff; border: 2px solid #555; border-radius: 3px; font-size: 9px; font-weight: 700; color: #333; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }

/* map legend */
#map-legend { position: absolute; bottom: 40px; left: 10px; z-index: 400; background: rgba(26,26,26,0.92); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 11px; display: none; flex-direction: column; gap: 5px; backdrop-filter: blur(4px); }
#map-legend.visible { display: flex; }
.legend-row { display: flex; align-items: center; gap: 6px; color: var(--text2); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.3); }
.legend-line { width: 18px; height: 4px; border-radius: 2px; flex-shrink: 0; }

#loading { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; font-size: 12px; letter-spacing: 0.08em; color: var(--accent); text-align: center; padding: 32px; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#load-msg { color: var(--text2); font-size: 12px; }

#error-msg { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 32px; text-align: center; }
#error-msg h2 { color: var(--red); font-size: 16px; }
#error-msg p { font-size: 13px; color: var(--text2); line-height: 1.6; max-width: 320px; }
#error-detail { font-size: 11px; color: var(--text3); font-family: monospace; max-width: 320px; word-break: break-all; }

@media (min-width: 768px) {
  #tabs { display: none; }
  #map-panel, #list-panel { bottom: 0; transition: none; transform: none !important; }
  #map-panel { left: 320px; right: 0; }
  #list-panel { left: 0; right: auto; width: 320px; border-right: 1px solid var(--border); z-index: 2; }
  #bottom-sheet { left: 320px; bottom: 0; border-radius: 0; max-height: 45vh; }
  #map-legend { left: 330px; }
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div>LOADING</div><div id="load-msg"></div></div>
<div id="error-msg">
  <h2>Could not load sheet</h2>
  <p>Make sure your Google Sheet is published as CSV via File → Share → Publish to web → CSV.</p>
  <div id="error-detail"></div>
</div>

<div id="header">
  <div id="header-logo">CHI/APTS</div>
  <div id="filter-scroll">
    <div class="chip"><span>💰</span>
      <select id="f-rent">
        <option value="">Any rent</option>
        <option value="1500">≤ $1,500</option>
        <option value="2000">≤ $2,000</option>
        <option value="2500">≤ $2,500</option>
        <option value="3000">≤ $3,000</option>
        <option value="3500">≤ $3,500</option>
        <option value="4000">≤ $4,000</option>
      </select>
    </div>
    <div class="chip"><span>🛏</span>
      <select id="f-beds">
        <option value="">Any beds</option>
        <option value="0">Studio</option>
        <option value="1">1 bed</option>
        <option value="2">2 beds</option>
        <option value="3">3 beds</option>
      </select>
    </div>
    <div class="chip">
      <select id="f-avail">
        <option value="">Any status</option>
        <option value="yes">Available</option>
        <option value="no">Unavailable</option>
      </select>
    </div>
    <div class="chip">
      <select id="f-wd">
        <option value="">W/D: any</option>
        <option value="yes">W/D in-unit</option>
      </select>
    </div>
    <!-- Map overlay toggles -->
    <div class="chip toggle" id="toggle-train" onclick="toggleOverlay('train')">🚇 L Train</div>
    <div class="chip toggle" id="toggle-bus"   onclick="toggleOverlay('bus')">🚌 Bus</div>
    <div class="chip toggle" id="toggle-gym"   onclick="toggleOverlay('gym')">💪 Gyms</div>
    <div class="chip toggle" id="toggle-grocery" onclick="toggleOverlay('grocery')">🛒 Grocery</div>
  </div>
</div>

<div id="map-panel" class="active">
  <div id="map"></div>
  <div id="map-legend"></div>
</div>

<div id="list-panel">
  <div id="list-header">
    <span id="list-count">— apartments</span>
    <span id="list-sort" style="cursor:pointer;">↕ Rent</span>
  </div>
  <div id="apt-list"></div>
</div>

<div id="bottom-sheet">
  <div id="sheet-handle" onclick="closeSheet()"><div id="sheet-handle-bar"></div></div>
  <div id="sheet-content"></div>
</div>

<div id="tabs">
  <div class="tab active" id="tab-map" onclick="showTab('map')"><div class="tab-icon">🗺</div><div>Map</div></div>
  <div class="tab" id="tab-list" onclick="showTab('list')"><div class="tab-icon">☰</div><div>List</div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQueQE5zSZ4CFNzB3Mmzzwg_p3gxLk7CPm10htt_t0F8iS5riuUA0tBonPha7c8voUEjTNr-kP5CZFz/pub?gid=0&single=true&output=csv';

// ── CTA LINE COLORS ───────────────────────────────────────────────────────
const CTA_LINES = {
  Red:    { color: '#c60c30', route_id: 'Red' },
  Blue:   { color: '#00a1de', route_id: 'Blue' },
  Brown:  { color: '#62361b', route_id: 'Brn' },
  Green:  { color: '#009b3a', route_id: 'G' },
  Orange: { color: '#f9461c', route_id: 'Org' },
  Pink:   { color: '#e27ea6', route_id: 'Pink' },
  Purple: { color: '#522398', route_id: 'P' },
  Yellow: { color: '#f9e300', route_id: 'Y' },
};

const SYNONYMS = {
  name:        ['name','apartmentname','aptname'],
  address:     ['address','addr'],
  lat:         ['lat','latitude'],
  lng:         ['lng','lon','long','longitude'],
  rent:        ['rent','rentcost','cost','price'],
  beds:        ['beds','bed','bedrooms','bedroom'],
  baths:       ['baths','bath','bathrooms','bathroom'],
  sqft:        ['sqft','squarefootage','sf'],
  noise:       ['noise','noiselevel','noisylevel'],
  washerDryer: ['washerdryer','wd','inunitwasherdryer','laundry'],
  available:   ['available','availability','avail'],
  topFloor:    ['topfloor','topfloorunit'],
  acType:      ['actype','ac','airconditioningtype','acunit','ac type'],
  outdoor:     ['outdoor','outdoorspace','balcony','outdoor space'],
  tourDate:    ['tourdate','tour'],
  url:         ['url','link','listingurl'],
  notes:       ['notes','note','other','comments'],
  status:      ['status'],
  rating:      ['rating','myrating'],
};

let APTS = [], visibleIdxs = [], selectedIdx = null, sortAsc = true;
let markers = {}, map;
let overlayLayers = { train: [], bus: [], gym: [], grocery: [] };
let overlayOn     = { train: false, bus: false, gym: false, grocery: false };
let overlayLoaded = { train: false, bus: false, gym: false, grocery: false };

// ── INIT ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  initMap();
  await fetchData();
});

function initMap() {
  map = L.map('map', { center: [41.88, -87.65], zoom: 12, zoomControl: false });
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OSM © CARTO', subdomains: 'abcd', maxZoom: 19
  }).addTo(map);
}

// ── APARTMENT MARKERS ─────────────────────────────────────────────────────
function pinIcon(apt, sel) {
  const sz  = sel ? 34 : 28;
  const lbl = apt.beds === 0 ? 'STU' : (apt.beds ? apt.beds+'BR' : '?');
  const av  = yn(apt.available);
  const cls = 'map-pin'+(sel?' sel':'')+(av===false?' unavail':'');
  return L.divIcon({
    html: `<div class="${cls}" style="width:${sz}px;height:${sz}px;"><div class="pin-label">${lbl}</div></div>`,
    className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz]
  });
}

function placeMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  APTS.forEach((apt, i) => {
    if (!apt.lat || !apt.lng) return;
    markers[i] = L.marker([apt.lat, apt.lng], { icon: pinIcon(apt, false), zIndexOffset: 500 })
      .addTo(map).on('click', () => selectApt(i));
  });
}

// ── MAP OVERLAYS ──────────────────────────────────────────────────────────
async function toggleOverlay(type) {
  overlayOn[type] = !overlayOn[type];
  document.getElementById('toggle-'+type).classList.toggle('on', overlayOn[type]);

  if (overlayOn[type] && !overlayLoaded[type]) {
    await loadOverlay(type);
    overlayLoaded[type] = true;
  }

  overlayLayers[type].forEach(l => {
    if (overlayOn[type]) { if (!map.hasLayer(l)) l.addTo(map); }
    else map.removeLayer(l);
  });

  updateLegend();
}

async function loadOverlay(type) {
  setMsg('Loading '+type+' data…');
  try {
    if (type === 'train') await loadTrainLines();
    if (type === 'bus')   await loadBusStops();
    if (type === 'gym')   await loadOverpass('gym');
    if (type === 'grocery') await loadOverpass('grocery');
  } catch(e) {
    console.warn('Overlay load failed:', type, e);
  }
  setMsg('');
}

// CTA train lines + stations via Chicago open data
async function loadTrainLines() {
  // Load rail lines GeoJSON
  const linesUrl = 'https://data.cityofchicago.org/resource/vrpq-8xy5.geojson?$limit=5000';
  const stopsUrl = 'https://data.cityofchicago.org/resource/8pix-ypme.json?$limit=2000';

  const [linesRes, stopsRes] = await Promise.all([
    fetch(linesUrl), fetch(stopsUrl)
  ]);
  const linesGeo = await linesRes.json();
  const stops    = await stopsRes.json();

  // Draw colored polylines per CTA line
  const lineColors = {
    red:'#c60c30', blue:'#00a1de', brn:'#62361b', g:'#009b3a',
    org:'#f9461c', pink:'#e27ea6', p:'#522398', pexp:'#522398', y:'#f9e300'
  };

  if (linesGeo.features) {
    linesGeo.features.forEach(f => {
      const lines = f.properties?.LINES?.toLowerCase().split(',').map(s=>s.trim()) || [];
      lines.forEach(lineKey => {
        const color = lineColors[lineKey] || '#888';
        const layer = L.geoJSON(f, {
          style: { color, weight: 3.5, opacity: 0.85, dashArray: null }
        });
        overlayLayers.train.push(layer);
      });
    });
  }

  // Draw station dots — colored by lines served
  stops.forEach(s => {
    const lat = parseFloat(s.location?.latitude  || s.lat);
    const lng = parseFloat(s.location?.longitude || s.lon);
    if (!lat || !lng) return;

    // Pick first line color for the dot
    const lineKeys = ['red','blue','brn','g','org','pink','p','y'];
    let dotColor = '#888';
    for (const k of lineKeys) {
      if (s[k] === '1' || s[k] === true) { dotColor = lineColors[k]; break; }
    }

    const icon = L.divIcon({
      html: `<div class="stop-dot" style="width:10px;height:10px;background:${dotColor};"></div>`,
      className:'', iconSize:[10,10], iconAnchor:[5,5]
    });
    const layer = L.marker([lat, lng], { icon, zIndexOffset: -100 })
      .bindTooltip(s.station_name || s.stationame || '', { direction:'top', offset:[0,-4] });
    overlayLayers.train.push(layer);
  });
}

// Bus stops via Chicago open data
async function loadBusStops() {
  const url = 'https://data.cityofchicago.org/resource/hvnx-qtky.json?$limit=3000&$where=public_nam=%27CTA%27';
  try {
    const res  = await fetch(url);
    const data = await res.json();
    data.forEach(s => {
      const lat = parseFloat(s.location?.latitude  || s.lat);
      const lng = parseFloat(s.location?.longitude || s.lon);
      if (!lat || !lng) return;
      const icon = L.divIcon({
        html: `<div class="bus-stop-icon" style="width:9px;height:9px;"></div>`,
        className:'', iconSize:[9,9], iconAnchor:[4,4]
      });
      const layer = L.marker([lat, lng], { icon, zIndexOffset: -200 });
      overlayLayers.bus.push(layer);
    });
  } catch(e) {
    // Fallback: Overpass for bus stops
    await loadOverpass('bus');
  }
}

// Gyms + grocery via OpenStreetMap Overpass
async function loadOverpass(type) {
  const bounds = '41.64,-87.85,42.05,-87.52'; // Chicago bounding box
  const queries = {
    gym:     `node["leisure"~"fitness_centre|sports_centre"](${bounds});node["amenity"="gym"](${bounds});`,
    grocery: `node["shop"~"supermarket|grocery|convenience"](${bounds});`,
    bus:     `node["highway"="bus_stop"](${bounds});`
  };
  const q = `[out:json][timeout:25];(${queries[type]});out 500;`;
  const res  = await fetch('https://overpass-api.de/api/interpreter', {
    method:'POST', body:'data='+encodeURIComponent(q)
  });
  const data = await res.json();

  const cfg = {
    gym:     { emoji:'💪', color:'#7ec8a0' },
    grocery: { emoji:'🛒', color:'#7ab8d4' },
    bus:     { emoji:'', color:'#aaa' },
  }[type];

  (data.elements||[]).forEach(el => {
    if (!el.lat || !el.lon) return;
    const name = el.tags?.name || '';
    const icon = L.divIcon({
      html: type === 'bus'
        ? `<div class="bus-stop-icon" style="width:9px;height:9px;"></div>`
        : `<div style="background:${cfg.color};border:1.5px solid #111;border-radius:4px;padding:1px 5px;font-size:10px;font-weight:600;color:#111;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.4);">${cfg.emoji} ${name.length>18?name.slice(0,18)+'…':name}</div>`,
      className:'', iconAnchor: type==='bus' ? [4,4] : [0,10]
    });
    const layer = L.marker([el.lat, el.lon], { icon, zIndexOffset:-300 });
    if (name) layer.bindTooltip(name, { direction:'top' });
    overlayLayers[type === 'bus' ? 'bus' : type].push(layer);
  });
}

// ── MAP LEGEND ────────────────────────────────────────────────────────────
function updateLegend() {
  const legend = document.getElementById('map-legend');
  const rows = [];

  if (overlayOn.train) {
    Object.entries(CTA_LINES).forEach(([name, cfg]) => {
      rows.push(`<div class="legend-row"><div class="legend-line" style="background:${cfg.color};"></div>${name} Line</div>`);
    });
    rows.push(`<div class="legend-row"><div class="legend-dot" style="background:#888;"></div>Station</div>`);
  }
  if (overlayOn.bus) {
    rows.push(`<div class="legend-row"><div class="bus-stop-icon legend-dot" style="width:10px;height:10px;border-radius:2px;"></div>Bus stop</div>`);
  }
  if (overlayOn.gym) {
    rows.push(`<div class="legend-row"><span style="font-size:12px;">💪</span> Gym / Fitness</div>`);
  }
  if (overlayOn.grocery) {
    rows.push(`<div class="legend-row"><span style="font-size:12px;">🛒</span> Grocery store</div>`);
  }

  legend.innerHTML = rows.join('');
  legend.classList.toggle('visible', rows.length > 0);
}

// ── FETCH & GEOCODE ───────────────────────────────────────────────────────
async function fetchData() {
  try {
    setMsg('');
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error('HTTP '+res.status);
    const csv = await res.text();
    APTS = parseCSV(csv);
    if (!APTS.length) throw new Error('No apartments found. Check that your sheet has a header row and at least one data row.');

    const needsGeo = APTS.filter(a => !a.lat || !a.lng);
    for (let i = 0; i < needsGeo.length; i++) {
      setMsg(`Looking up address ${i+1} of ${needsGeo.length}…`);
      await geocode(needsGeo[i]);
      if (i < needsGeo.length - 1) await sleep(1100);
    }

    placeMarkers();
    applyFilters();
    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'flex';
    document.getElementById('error-detail').textContent = e.message;
    console.error('fetchData failed:', e);
  }
}

function setMsg(txt) { document.getElementById('load-msg').textContent = txt; }
function sleep(ms)   { return new Promise(r => setTimeout(r, ms)); }

async function geocode(apt) {
  if (!apt.address) return;
  try {
    const addr = /chicago/i.test(apt.address) ? apt.address : apt.address+', Chicago, IL';
    const res  = await fetch(
      'https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(addr),
      { headers:{'Accept-Language':'en','User-Agent':'ChiApts/1.0'} }
    );
    const data = await res.json();
    if (data?.[0]) { apt.lat = parseFloat(data[0].lat); apt.lng = parseFloat(data[0].lon); }
    else console.warn('No geocode result for:', apt.address);
  } catch(e) { console.warn('Geocode error:', apt.address, e); }
}

// ── CSV PARSER ────────────────────────────────────────────────────────────
function normalizeHeader(h) { return h.trim().toLowerCase().replace(/[^a-z0-9]/g,''); }

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return [];

  const allSyn = new Set(Object.values(SYNONYMS).flat().map(s => s.replace(/[^a-z0-9]/g,'')));
  let headerIdx = -1, headers = [];
  for (let i = 0; i < Math.min(lines.length, 5); i++) {
    const row = parseRow(lines[i]).map(normalizeHeader);
    if (row.some(h => allSyn.has(h))) { headerIdx = i; headers = row; break; }
  }
  if (headerIdx === -1) throw new Error('Could not find a valid header row. Make sure row 1 has column names like "name", "address", "rent".');

  const colIdx = {};
  for (const [field, syns] of Object.entries(SYNONYMS)) {
    for (const s of syns) {
      const i = headers.indexOf(s.replace(/[^a-z0-9]/g,''));
      if (i !== -1) { colIdx[field] = i; break; }
    }
  }
  const get = (vals, f) => { const i = colIdx[f]; return (i!==undefined && i<vals.length) ? vals[i].trim() : ''; };

  return lines.slice(headerIdx+1).map(line => {
    const v = parseRow(line);
    if (v.every(c => !c.trim())) return null;
    const name = get(v,'name'), address = get(v,'address');
    if (!name && !address) return null;
    const bedsRaw = get(v,'beds');
    return {
      name:        name || address || 'Unnamed',
      address:     address,
      lat:         parseFloat(get(v,'lat'))  || 0,
      lng:         parseFloat(get(v,'lng'))  || 0,
      rent:        parseInt(get(v,'rent'))   || 0,
      beds:        bedsRaw.toLowerCase()==='studio' ? 0 : (bedsRaw!=='' ? parseInt(bedsRaw) : null),
      baths:       get(v,'baths')!=='' ? parseFloat(get(v,'baths')) : null,
      sqft:        parseInt(get(v,'sqft'))   || 0,
      noise:       get(v,'noise'),
      washerDryer: get(v,'washerDryer'),
      available:   get(v,'available'),
      topFloor:    get(v,'topFloor'),
      acType:      get(v,'acType'),
      outdoor:     get(v,'outdoor'),
      tourDate:    get(v,'tourDate'),
      url:         get(v,'url'),
      notes:       get(v,'notes'),
      status:      get(v,'status'),
      rating:      get(v,'rating'),
    };
  }).filter(Boolean);
}

function parseRow(row) {
  const res=[]; let cur=''; let inQ=false;
  for (let i=0;i<row.length;i++) {
    const c=row[i];
    if (c==='"') { if(inQ&&row[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
    else if (c===','&&!inQ) { res.push(cur);cur=''; }
    else cur+=c;
  }
  res.push(cur); return res;
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function yn(v) {
  if (!v) return null;
  const s = v.toString().toLowerCase().trim();
  if (['yes','y','true','1','✓'].includes(s)) return true;
  if (['no','n','false','0','✗'].includes(s)) return false;
  return null;
}
function fmtDate(s) {
  if (!s) return '';
  try { return new Date(s+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
  catch { return s; }
}

// ── FILTERS ───────────────────────────────────────────────────────────────
function applyFilters() {
  const maxRent = parseInt(document.getElementById('f-rent').value)||Infinity;
  const beds    = document.getElementById('f-beds').value;
  const avail   = document.getElementById('f-avail').value;
  const wd      = document.getElementById('f-wd').value;

  visibleIdxs = APTS.map((_,i)=>i).filter(i => {
    const a = APTS[i];
    if (a.rent && a.rent > maxRent) return false;
    if (beds!=='' && a.beds!==parseInt(beds)) return false;
    if (avail==='yes' && yn(a.available)!==true)  return false;
    if (avail==='no'  && yn(a.available)!==false) return false;
    if (wd==='yes'    && yn(a.washerDryer)!==true) return false;
    return true;
  });
  visibleIdxs.sort((a,b)=>sortAsc?(APTS[a].rent||0)-(APTS[b].rent||0):(APTS[b].rent||0)-(APTS[a].rent||0));

  APTS.forEach((_,i)=>{
    const m=markers[i]; if(!m) return;
    if (visibleIdxs.includes(i)) { if(!map.hasLayer(m)) m.addTo(map); }
    else map.removeLayer(m);
    m.setIcon(pinIcon(APTS[i], i===selectedIdx));
  });
  renderList();
}

['f-rent','f-beds','f-avail','f-wd'].forEach(id =>
  document.getElementById(id).addEventListener('change', applyFilters)
);
document.getElementById('list-sort').addEventListener('click', ()=>{
  sortAsc=!sortAsc;
  document.getElementById('list-sort').textContent=sortAsc?'↑ Rent':'↓ Rent';
  applyFilters();
});

// ── RENDER LIST ───────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('apt-list');
  list.innerHTML = '';
  document.getElementById('list-count').textContent = `${visibleIdxs.length} of ${APTS.length} apartments`;

  visibleIdxs.forEach(i => {
    const a    = APTS[i];
    const avail= yn(a.available);
    const card = document.createElement('div');
    card.className = 'apt-card'+(selectedIdx===i?' selected':'');

    const availTag   = avail===true  ? `<span class="tag avail">Available</span>`
                     : avail===false ? `<span class="tag unavail">Unavailable</span>` : '';
    const wdTag      = yn(a.washerDryer)===true ? `<span class="tag green">W/D in-unit</span>` : '';
    const topTag     = yn(a.topFloor)===true ? `<span class="tag gold">Top floor</span>` : '';
    const outdoorTag = a.outdoor && yn(a.outdoor)!==false ? `<span class="tag green">🌿 ${a.outdoor}</span>` : '';
    const statusTag  = a.status ? `<span class="tag">${a.status}</span>` : '';
    const ratingTag  = a.rating ? `<span class="tag gold">${'★'.repeat(Math.min(parseInt(a.rating)||0,5))}</span>` : '';

    card.innerHTML = `
      <div class="card-top">
        <div class="card-name">${a.name}</div>
        <div class="card-price">${a.rent?'$'+a.rent.toLocaleString():'—'}</div>
      </div>
      <div class="card-address">${a.address}</div>
      <div class="card-tags">
        ${availTag}${statusTag}
        ${a.beds!=null?`<span class="tag gold">${a.beds===0?'Studio':a.beds+' bd'}${a.baths?' / '+a.baths+' ba':''}</span>`:''}
        ${a.sqft?`<span class="tag">${a.sqft.toLocaleString()} sqft`:''}
        ${wdTag}${topTag}${outdoorTag}${ratingTag}
      </div>
      <div class="card-footer">
        ${a.tourDate?`<span class="tour-date">📅 ${fmtDate(a.tourDate)}</span>`:''}
        ${a.noise?`<span>🔊 ${a.noise}</span>`:''}
        ${a.acType?`<span>❄️ ${a.acType}</span>`:''}
      </div>`;
    card.addEventListener('click', ()=>selectApt(i));
    list.appendChild(card);
  });
}

// ── SELECT ────────────────────────────────────────────────────────────────
function selectApt(i) {
  selectedIdx = selectedIdx===i ? null : i;
  applyFilters();
  if (selectedIdx===null) { closeSheet(); return; }
  const a = APTS[selectedIdx];
  if (a.lat&&a.lng) map.flyTo([a.lat,a.lng],15,{duration:0.6});
  renderSheet(a);
  document.getElementById('bottom-sheet').classList.add('open');
  if (window.innerWidth<768) showTab('map');
}
function closeSheet() {
  document.getElementById('bottom-sheet').classList.remove('open');
  selectedIdx=null; applyFilters();
}

// ── DETAIL SHEET ──────────────────────────────────────────────────────────
function dg(label, val, cls='') {
  if (val===null||val===undefined||val==='') return '';
  return `<div class="dg-item"><div class="dg-label">${label}</div><div class="dg-val ${cls}">${val}</div></div>`;
}
function renderSheet(a) {
  const avail = yn(a.available);
  const pps   = a.sqft&&a.rent ? (a.rent/a.sqft).toFixed(2) : null;
  document.getElementById('sheet-content').innerHTML = `
    <div class="detail-name">${a.name}</div>
    <div class="detail-address">${a.address}</div>
    <div class="detail-price">$${a.rent?a.rent.toLocaleString():'—'} <span>/ month</span></div>
    ${avail!==null?`<div class="avail-pill ${avail?'yes':'no'}">${avail?'✓ Available':'✗ Not available'}</div>`:''}
    ${a.status?`<div style="margin-bottom:10px;font-size:12px;color:var(--text2);">Status: <strong>${a.status}</strong></div>`:''}
    ${a.rating?`<div style="margin-bottom:12px;font-size:18px;color:var(--accent);">${'★'.repeat(Math.min(parseInt(a.rating)||0,5))}${'☆'.repeat(5-Math.min(parseInt(a.rating)||0,5))}</div>`:''}

    <div class="section-title" style="margin-top:0;">Unit</div>
    <div class="detail-grid">
      ${dg('Beds',    a.beds===0?'Studio':(a.beds!=null?a.beds:null),'gold')}
      ${dg('Baths',   a.baths)}
      ${dg('Sqft',    a.sqft?a.sqft.toLocaleString():null)}
      ${dg('$/sqft',  pps?'$'+pps:null)}
      ${dg('W/D',     a.washerDryer, yn(a.washerDryer)===true?'green':yn(a.washerDryer)===false?'red':'')}
      ${dg('Top floor',a.topFloor,   yn(a.topFloor)===true?'gold':'')}
      ${dg('AC',      a.acType)}
      ${dg('Outdoor', a.outdoor)}
      ${dg('Noise',   a.noise)}
    </div>

    ${a.tourDate?`<div class="section-title">Tour</div>
    <div style="margin-bottom:14px;font-size:14px;color:var(--yellow);">📅 ${a.tourDate}</div>`:''}

    ${a.notes?`<div class="section-title">Notes</div><div class="notes-box">${a.notes}</div>`:''}

    ${a.url?`<a href="${a.url}" target="_blank" class="action-btn">View Listing →</a>`:''}
    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a.address)}" target="_blank" class="action-btn">Open in Google Maps →</a>
  `;
}

// ── TABS ──────────────────────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('map-panel').classList.toggle('active',tab==='map');
  document.getElementById('list-panel').classList.toggle('active',tab==='list');
  document.getElementById('tab-map').classList.toggle('active',tab==='map');
  document.getElementById('tab-list').classList.toggle('active',tab==='list');
  if (tab==='map') setTimeout(()=>map.invalidateSize(),260);
}
</script>
